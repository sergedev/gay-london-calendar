<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <clipPath id="cal-body">
      <rect x="3" y="6" width="26" height="23" rx="3"/>
    </clipPath>
  </defs>

  <!-- Binder rings (drawn first so they sit behind the body's top edge) -->
  <rect x="9"  y="2" width="2.5" height="6" rx="1.25" fill="#0f172a"/>
  <rect x="20.5" y="2" width="2.5" height="6" rx="1.25" fill="#0f172a"/>

  <!-- Calendar body, clipped to a rounded rectangle -->
  <g clip-path="url(#cal-body)">
    <!-- Top dark header band (month/year strip) -->
    <rect x="3" y="6" width="26" height="5" fill="#0f172a"/>

    <!-- Six rainbow stripes filling the page area -->
    <rect x="3" y="11" width="26" height="3"   fill="#E40303"/>
    <rect x="3" y="14" width="26" height="3"   fill="#FF8C00"/>
    <rect x="3" y="17" width="26" height="3"   fill="#FFED00"/>
    <rect x="3" y="20" width="26" height="3"   fill="#008026"/>
    <rect x="3" y="23" width="26" height="3"   fill="#004DFF"/>
    <rect x="3" y="26" width="26" height="3"   fill="#732982"/>
  </g>
</svg>
